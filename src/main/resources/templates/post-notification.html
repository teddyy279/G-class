<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
<div style="max-width: 600px; background: white; margin: auto; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
    <h2 style="color: #1a73e8;" th:text="${className}">Tên lớp học</h2>
    <p><strong>Thông báo mới:</strong></p>
    <p style="color: #555;" th:text="${content}">Nội dung bài đăng...</p>

    <div style="margin-top: 30px; text-align: center;">
        <a th:href="${postUrl}"
           style="background-color: #1a73e8; color: white; padding: 12px 25px; text-decoration: none; border-radius: 4px; font-weight: bold;">
            Xem chi tiết
        </a>
    </div>
</div>
</body>
</html>
