<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
        .header { background-color: #1e8e3e; padding: 20px; color: white; display: flex; align-items: center; }
        .header img { width: 40px; margin-right: 15px; }
        .header h1 { font-size: 18px; margin: 0; }
        .content { padding: 30px; line-height: 1.6; color: #3c4043; }
        .author-info { font-weight: bold; color: #1e8e3e; margin-bottom: 5px; }
        .classwork-box { border: 1px solid #dadce0; border-radius: 8px; padding: 20px; margin-top: 20px; }
        .type-label { font-size: 12px; text-transform: uppercase; color: #70757a; letter-spacing: 1px; font-weight: bold; }
        .classwork-title { font-size: 20px; margin: 10px 0; color: #202124; }
        .btn-link { display: inline-block; padding: 10px 24px; background-color: white; color: #1e8e3e; border: 1px solid #dadce0;
                    text-decoration: none; border-radius: 4px; font-weight: 500; margin-top: 15px; transition: background 0.2s; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #70757a; background-color: #f1f3f4; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>G-Classroom</h1>
    </div>

    <div class="content">
        <div class="author-info">
            <span th:text="${authorName}">Giảng viên</span> (Lớp học)
        </div>

        <div class="classwork-box">
            <div class="type-label" th:text="${typeLabel + ' mới'}">BÀI TẬP MỚI</div>
            <div class="classwork-title" th:text="${title}">Tiêu đề bài tập</div>

            <a th:href="${detailUrl}" class="btn-link">Xem chi tiết</a>
        </div>

    </div>

    <div class="footer">
        Hệ thống quản lý lớp học G-Class;
    </div>
</div>
</body>
</html>
